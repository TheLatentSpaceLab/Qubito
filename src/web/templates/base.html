<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Qubito{% endblock %}</title>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
<script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.17/dist/tailwind.min.css" rel="stylesheet">
<style>
  body { background: #0f172a; color: #e2e8f0; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 1.25rem; }
  nav a { color: #94a3b8; text-decoration: none; padding: 0.5rem 1rem; border-radius: 0.5rem; }
  nav a:hover, nav a.active { color: #f1f5f9; background: #334155; }
</style>
</head>
<body class="min-h-screen">
<header class="border-b border-gray-700 px-6 py-3 flex items-center gap-6">
  <h1 class="text-xl font-bold text-rose-400">Qubito</h1>
  <nav class="flex gap-1">
    <a href="/ui/" {% if active == "dashboard" %}class="active"{% endif %}>Dashboard</a>
    <a href="/ui/chat" {% if active == "chat" %}class="active"{% endif %}>Chat</a>
    <a href="/ui/config" {% if active == "config" %}class="active"{% endif %}>Config</a>
    <a href="/ui/logs" {% if active == "logs" %}class="active"{% endif %}>Logs</a>
  </nav>
</header>
<main class="p-6">
  {% block content %}{% endblock %}
</main>
</body>
</html>
