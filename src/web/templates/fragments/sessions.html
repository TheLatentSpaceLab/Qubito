<h3 class="text-sm font-semibold text-gray-400 uppercase mb-3">Active Sessions</h3>
{% if sessions %}
<table class="w-full text-sm">
  <thead>
    <tr class="text-gray-400 border-b border-gray-700">
      <th class="text-left py-2">Character</th>
      <th class="text-left py-2">ID</th>
      <th class="text-right py-2">Messages</th>
      <th class="text-right py-2">Created</th>
    </tr>
  </thead>
  <tbody>
    {% for s in sessions %}
    <tr class="border-b border-gray-800">
      <td class="py-2">{{ s.emoji }} {{ s.character_name }}</td>
      <td class="py-2 font-mono text-gray-400">{{ s.id[:8] }}</td>
      <td class="py-2 text-right">{{ s.message_count }}</td>
      <td class="py-2 text-right text-gray-400">{{ s.created_at[:19] }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="text-gray-500">No active sessions.</p>
{% endif %}
